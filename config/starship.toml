add_newline = false
format = """
$hostname$directory$git_branch
$username"""

[fill]
symbol = '-'
style = 'fg:245'

[package]
disabled = true

[git_branch]
style = "bg: 252"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = "[](bold fg:#b4befe)[$symbol $branch(:$remote_branch)](fg:#585b70 bg:#b4befe)[](bold fg:#b4befe)"

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 ‍"
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](green)'
renamed = " ✍️ "
deleted = " 🗑 "

[hostname]
ssh_only = false
format =  "[](bold bg: #b4befe)[$hostname](bg:#b4befe bold fg:#585b70)[](bold fg:#b4befe)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[username]
format = "[](bold fg:#b4befe)[$user](bold bg:#b4befe fg:#585b70)[](bold fg:#b4befe)"
disabled = false
show_always = true

[directory]
home_symbol = " "
format = '[](bold fg:#b4befe)[$path](bold fg:#585b70 bg:#b4befe)[](bold fg:#b4befe)'


[directory.substitutions]
"Рабочий стол" = " "
"Документы" = " "
"Загрузки" = " "
"Музыка" = "󰎈 "
"Изображения" = " "
"Видео" = " "
"Общедоступные" = " "
"Шаблоны" = " "
".config" = " "
".local" = " "
".var" = " "
".icons" = " "

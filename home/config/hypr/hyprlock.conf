$font = CaskaydiaCove Nerd Font

general {
    	hide_cursor = false
}

animations {
    	enabled = true
    	bezier = linear, 1, 1, 0, 0
    	animation = fadeIn, 1, 5, linear
    	animation = fadeOut, 1, 5, linear
    	animation = inputFieldDots, 1, 2, linear
}

background {
    	monitor =
    	path = /home/dimunyx/.config/hypr/wallpaper/gentoo.png
    	blur_passes = 0.5
}

input-field {
    	monitor =
    	size = 20%, 5%
    	outline_thickness = 6
    	inner_color = rgba(0,0,0,0)
    	outer_color = rgba(180,190,254,1)
    	check_color = rgba(0,255,0,1)
    	fail_color = rgba(255,0,0,1)
    	font_color = rgba(166,173,200,1)
	fade_on_empty = false
    	rounding = 20
    	font_family = $font
    	placeholder_text = Пароль...
    	fail_text = $PAMFAIL
    	dots_spacing = 0.3
	dots_size = 0.3
	position = -760, 5
    	halign = center
    	valign = bottom
}

label {
    	monitor =
    	text = $TIME
    	font_size = 90
    	font_family = $font
    	halign = center
    	valign = top
	position = -795, 27
	color = rgba(166,173,200,1)
}

label {
	monitor =
    	text = cmd[update:1000] echo "$(date +'%d.%m.%Y')"
    	font_size = 24
    	font_family = $font
  	position = -795, -100
    	halign = center
    	valign = top
	color = rgba(166,173,200,1)
}

label {
    	monitor =
    	text = $LAYOUT[us,ru]
    	font_size = 24
	font_family = $font
    	onclick = hyprctl switchxkblayout all next
    	position = -530, 15
   	halign = center
   	valign = bottom
	color = rgba(166,173,200,1)
}
